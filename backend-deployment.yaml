apiVersion: apps/v1
kind: Deployment
metadata:
  name: scholarhub-backend
  namespace: scholarhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scholarhub-backend
  template:
    metadata:
      labels:
        app: scholarhub-backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "scholarhub-role"
        vault.hashicorp.com/auth-path: "auth/kubernetes"
        # Nama file yang akan dibuat adalah /vault/secrets/database-config
        vault.hashicorp.com/agent-inject-secret-database-config: "database/creds/scholarhub-role"
        vault.hashicorp.com/agent-inject-template-database-config: |
          {{- with secret "database/creds/scholarhub-role" -}}
          export DB_USER="{{ .Data.username }}"
          export DB_PASSWORD="{{ .Data.password }}"
          {{- end -}}
    spec:
      containers:
      - name: django
        image: scholarhub-backend:v12
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "mariadb.scholarhub.svc.cluster.local"
        - name: DJANGO_ALLOWED_HOSTS
          value: "*"
        command: ["/bin/sh", "-c"]
        args:
          - |
            # Tunggu file muncul supaya tidak error 'No such file'
            echo "Menunggu Vault Agent menyiapkan kredensial..."
            while [ ! -f /vault/secrets/database-config ]; do 
              sleep 1
            done
            
            # Load variable dan jalankan server
            . /vault/secrets/database-config
            echo "Kredensial ditemukan! Menjalankan Django..."
            python manage.py runserver 0.0.0.0:8000
---
apiVersion: v1
kind: Service
metadata:
  name: scholarhub-backend
  namespace: scholarhub
spec:
  type: LoadBalancer 
  selector:
    app: scholarhub-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000