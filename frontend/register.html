<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ScholarHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-bg">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12">
                <div class="card auth-card">
                    <div class="row g-0">
                        <div class="col-md-6 auth-left d-none d-md-flex">
                            <a href="index.html" class="text-white text-decoration-none mb-5 h4 fw-bold">
                                <i class="bi bi-mortarboard-fill"></i> ScholarHub
                            </a>
                            <h2 class="fw-bold mb-4">Start Your Journey</h2>
                            <p class="lead mb-0 opacity-75">Create an account to unlock hundreds of scholarship opportunities and take the first step toward your bright future.</p>
                        </div>
                        
                        <div class="col-md-6 auth-right">
                            <div class="text-center mb-4">
                                <h3 class="fw-bold text-dark">Create Account</h3>
                                <p class="text-muted small">Join our community of scholars today</p>
                            </div>
                            
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-semibold">Username</label>
                                    <input type="text" class="form-control form-control-custom" id="regUsername" placeholder="Choose a username" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-semibold">Email Address</label>
                                    <input type="email" class="form-control form-control-custom" id="regEmail" placeholder="name@example.com" required>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted small fw-semibold">Password</label>
                                    <input type="password" class="form-control form-control-custom" id="regPassword" placeholder="Create a strong password" required>
                                </div>
                                <button type="submit" class="btn btn-auth w-100 mb-4">Register</button>
                            </form>
                            
                            <div class="text-center text-muted small">
                                Already have an account? <a href="login.html" class="text-decoration-none fw-bold" style="color: #7b2cbf;">Sign In here</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>

</body>
</html>
